name: Build And Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (example: v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            asset_name: node-radarr-redownloader-linux-x64
          - os: windows-latest
            target: node18-win-x64
            asset_name: node-radarr-redownloader-win-x64.exe
          - os: macos-14
            target: node18-macos-x64
            asset_name: node-radarr-redownloader-macos-x64
          - os: macos-14
            target: node18-macos-arm64
            asset_name: node-radarr-redownloader-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Binary
        run: npx pkg . --targets ${{ matrix.target }} --out-path dist

      - name: Normalize Binary Name
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const dist='dist'; const files=fs.readdirSync(dist).filter((f)=>fs.statSync(path.join(dist,f)).isFile()); if(files.length!==1){console.error('Expected exactly 1 file in dist, found '+files.length+': '+files.join(', ')); process.exit(1);} const src=path.join(dist,files[0]); const dst=path.join(dist,process.env.ASSET_NAME); if(src!==dst){fs.renameSync(src,dst);} console.log('Prepared artifact: '+path.basename(dst));"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve Release Tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Create Release If Missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber
